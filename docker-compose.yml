version: "3.8"

services:
  # ── Backend: NestJS API ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qa-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  # ── Frontend: Vue.js + Nginx ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qa-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
