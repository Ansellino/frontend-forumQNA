server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
 
    # Semua route dikembalikan ke index.html
    # Ini yang membuat Vue Router history mode bekerja di Docker
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
